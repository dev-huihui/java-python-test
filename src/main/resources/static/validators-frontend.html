<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다양한 검증기 · 프론트 (Pyodide)</title>
    <link rel="stylesheet" href="/css/form.css">
    <style>
        select { width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: .95rem;
                 border: 1px solid #cfd3da; border-radius: 8px; background: #fff; }
        .sub { margin: 0 0 16px; padding: 10px 12px; background: #f4f5f7; border-radius: 8px;
               display: flex; gap: 16px; font-size: .86rem; align-items: center; }
        .sub .lead { color: #555; }
        .sub label { font-weight: 500; display: flex; align-items: center; gap: 6px; margin: 0; }
        .detail { margin-top: 10px; font-size: .82rem; color: #555; background: #f4f5f7;
                  border-radius: 6px; padding: 8px 10px; white-space: pre-wrap; word-break: break-all; }
        .hint { font-size: .8rem; color: #888; margin-top: 6px; }
    </style>
</head>
<body>
    <a class="back" href="/">← 목록으로</a>
    <h1>다양한 검증기 — 프론트</h1>
    <p class="subtitle">브라우저가 Pyodide 로 <code>validators.py</code> 를 실행합니다.</p>

    <form id="form">
        <div class="sub">
            <span class="lead">Pyodide 소스:</span>
            <label><input type="radio" name="source" value="online" checked> 온라인 (CDN)</label>
            <label><input type="radio" name="source" value="offline"> 오프라인 (로컬 번들)</label>
        </div>

        <div class="field">
            <label for="kind">검증 종류</label>
            <select id="kind"></select>
        </div>
        <div class="field">
            <label for="value">값</label>
            <input id="value" placeholder="">
            <div class="hint" id="hint"></div>
        </div>

        <button type="submit" id="submitBtn">브라우저에서 검증</button>
        <div class="status" id="status"></div>
        <div class="result" id="result"></div>
    </form>

    <script>
        const KINDS = [
            { key: "email",              label: "이메일 (정규식)",             ph: "user@example.com" },
            { key: "phone_kr",           label: "휴대폰 번호 (정규식+정규화)",  ph: "010-1234-5678" },
            { key: "korean_name",        label: "한글 이름 (정규식)",           ph: "홍길동" },
            { key: "hex_color",          label: "HEX 색상 (정규식)",           ph: "#4f7cff" },
            { key: "credit_card",        label: "신용카드 번호 (Luhn 체크섬)",  ph: "4111 1111 1111 1111" },
            { key: "business_no",        label: "사업자등록번호 (체크섬)",       ph: "123-45-67891" },
            { key: "ip_address",         label: "IP 주소 (ipaddress 모듈)",     ph: "192.168.0.1" },
            { key: "date",               label: "날짜 (datetime 파싱)",         ph: "2026-07-02" },
            { key: "url",                label: "URL (urllib 파싱)",            ph: "https://example.com" },
            { key: "password_strength",  label: "비밀번호 강도 (점수 기반)",     ph: "P@ssw0rd!" },
        ];

        const SOURCES = {
            online:  { script: "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js",
                       indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/" },
            offline: { script: "/pyodide/pyodide.js", indexURL: "/pyodide/" }
        };

        const form = document.getElementById("form");
        const kindSel = document.getElementById("kind");
        const valueInput = document.getElementById("value");
        const hint = document.getElementById("hint");
        const statusEl = document.getElementById("status");
        const result = document.getElementById("result");
        const submitBtn = document.getElementById("submitBtn");

        KINDS.forEach(k => {
            const opt = document.createElement("option");
            opt.value = k.key; opt.textContent = k.label;
            kindSel.appendChild(opt);
        });
        function syncPlaceholder() {
            const k = KINDS.find(x => x.key === kindSel.value);
            valueInput.placeholder = k ? k.ph : "";
            hint.textContent = k ? "예시: " + k.ph : "";
        }
        kindSel.addEventListener("change", syncPlaceholder);
        syncPlaceholder();

        // 선택한 소스의 로더를 동적 주입해 최초 1회만 로드
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement("script");
                s.src = src;
                s.onload = resolve;
                s.onerror = () => reject(new Error("스크립트 로드 실패: " + src));
                document.head.appendChild(s);
            });
        }

        let pyodide = null, validateFn = null;
        async function ensurePyodide(source) {
            if (validateFn) return;                 // 최초 1회만 로드 (소스 고정)
            const cfg = SOURCES[source];
            statusEl.textContent = "Python 런타임 로딩 중… (" + (source === "online" ? "온라인 CDN" : "오프라인 로컬") + ")";
            await loadScript(cfg.script);
            pyodide = await loadPyodide({ indexURL: cfg.indexURL });
            const code = await (await fetch("/python/validators.py")).text();
            pyodide.runPython(code);
            validateFn = pyodide.globals.get("validate");
            document.querySelectorAll('input[name="source"]').forEach(r => r.disabled = true);
            statusEl.textContent = "✓ Python 준비 완료 (" + (source === "online" ? "온라인" : "오프라인")
                + ") · 소스를 바꾸려면 새로고침하세요.";
        }

        function render(data) {
            result.className = "result " + (data.valid ? "ok" : "fail");
            let html = (data.valid ? "✓ " : "✗ ") + escapeHtml(data.message);
            if (data.detail && Object.keys(data.detail).length > 0) {
                html += '<div class="detail">' + escapeHtml(JSON.stringify(data.detail, null, 2)) + '</div>';
            }
            result.innerHTML = html;
        }
        function escapeHtml(s) {
            return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const kind = kindSel.value;
            const value = valueInput.value;
            result.className = "result"; result.textContent = "";
            submitBtn.disabled = true;
            try {
                const source = form.querySelector('input[name="source"]:checked').value;
                await ensurePyodide(source);
                const py = validateFn(kind, value);
                const data = py.toJs({ dict_converter: Object.fromEntries });
                py.destroy();
                render(data);
            } catch (err) {
                result.className = "result fail";
                result.textContent = "실행 실패: " + err.message;
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
